<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>CARROT STUDIO</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero card">
      <div class="hero-head">
        <div>
          <h1>CARROT STUDIO</h1>
        </div>
        <button id="logout-button" class="ghost compact hidden">退出</button>
      </div>
      <div id="message" class="message hidden" role="status"></div>
    </section>

    <section id="login-panel" class="card auth-card">
      <h2>账号登录</h2>
      
      <form id="login-form" class="stack-form">
        <label>
          账号
          <input id="login-username" name="username" autocomplete="username" placeholder="admin" required>
        </label>
        <label>
          密码
          <input id="login-password" name="password" type="password" autocomplete="current-password" placeholder="请输入登录密码" required>
        </label>
        <label class="checkbox-row">
          <input id="remember-me" name="rememberMe" type="checkbox" checked>
          <span>记住登录状态</span>
        </label>
        <button type="submit" class="primary large">登录进入控制台</button>
      </form>
    </section>

    <section id="dashboard" class="dashboard hidden">
      <section class="card">
        <div class="section-head">
          <div>
            <h2>关键指标</h2>
            <p id="target-text" class="muted">服务器IP：--</p>
          </div>
        </div>
        <div id="summary-cards" class="summary-grid">
          <p class="muted">登录后会自动加载关键指标。</p>
        </div>
      </section>

      <section class="card">
        <div class="section-head">
          <div>
            <h2>风扇转速</h2>
            
          </div>
        </div>
        <div id="fan-cards" class="fan-grid">
          <p class="muted">登录后会自动加载风扇数据。</p>
        </div>
      </section>

      <section class="card">
        <div class="section-head">
          <div>
            <h2>风扇控制</h2>
            
          </div>
        </div>

        <div class="speed-panel">
          <div class="speed-badge">
            <span>当前准备设置</span>
            <strong><span id="speed-display">30</span>%</strong>
          </div>
          <input id="speed-range" type="range" min="0" max="100" value="15">
          <div class="preset-row">
            <button type="button" class="secondary preset-button" data-speed="20">20%</button>
            <button type="button" class="secondary preset-button" data-speed="30">30%</button>
            <button type="button" class="secondary preset-button" data-speed="40">40%</button>
            <button type="button" class="secondary preset-button" data-speed="50">50%</button>
          </div>
          <div class="action-grid">
            <button id="set-manual" class="primary large">设置手动转速</button>
            <button id="set-auto" class="secondary large">恢复自动模式</button>
            <button id="refresh-sensors" class="ghost large">刷新传感器</button>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
